# ============================================
# Sensident — Dev local (Docker Compose)
# ============================================
# Services: PostgreSQL 16 + MailHog (catch-all SMTP pour le dev)
# Demarrage: docker compose up -d
# Arret:    docker compose down
# Reset DB: docker compose down -v

services:
  postgres:
    image: postgres:16-alpine
    container_name: sensident-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sensident
      POSTGRES_PASSWORD: sensident
      POSTGRES_DB: sensident
    ports:
      - "5432:5432"
    volumes:
      - sensident_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sensident -d sensident"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: sensident-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI (http://localhost:8025)

volumes:
  sensident_pgdata:
